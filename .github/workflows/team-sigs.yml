name: Verify Team Signature

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  verify-signatures:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          path: target-repo
          fetch-depth: 0

      - name: Checkout Sigs Repo
        uses: actions/checkout@v4
        with:
          repository: oreonhq/team-sigs
          path: team-sigs
          token: ${{ steps.get_token.outputs.token }}

      - name: Verify Commits
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          cd target-repo

          # Fetch the exact PR commits
          git fetch origin pull/${{ github.event.pull_request.number }}/head

          # 1. Import all team GPG public keys into the runner's fresh keyring
          echo "Importing team GPG keys..."
          for KEY_FILE in ../team-sigs/*.txt; do
            if [ -f "$KEY_FILE" ]; then
              gpg --import "$KEY_FILE"
            fi
          done

          # 2. Verify each commit
          COMMITS=$(gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].oid')

          for COMMIT in $COMMITS; do
            echo "Verifying commit $COMMIT..."

            # git verify-commit will check the signature against the keys we just imported.
            # If the commit was signed by ANY team member's key, it passes.
            if ! git verify-commit $COMMIT; then
              echo "❌ Error: Cryptographic verification failed for commit $COMMIT."
              exit 1
            fi

            echo "✅ Commit $COMMIT verified successfully."
          done
