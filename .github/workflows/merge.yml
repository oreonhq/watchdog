name: Fast-Forward Merge

on:
  issue_comment:
    types: [created]

jobs:
  merge:
    if: ${{ github.event.issue.pull_request && (github.event.comment.body == '/m') }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Verify Team Membership
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          ORG="${{ github.repository_owner }}"
          TEAM="${{ github.event.repository.name }}"
          ACTOR="${{ github.event.comment.user.login }}"

          echo "Verifying if @$ACTOR is a member of the @$ORG/$TEAM team..."
          # Queries the GitHub API. If the user is NOT in the team, this returns a 404 error and instantly fails the action.
          gh api orgs/$ORG/teams/$TEAM/memberships/$ACTOR > /dev/null
          echo "Verification passed. @$ACTOR is authorized."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.get_token.outputs.token }}
          fetch-depth: 0

      - name: Wait for Required Checks
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          echo "Waiting for all required branch protection checks to complete..."
          # The --watch flag blocks the action until checks finish.
          # The --required flag ignores optional checks.
          # If a required check fails, this command exits with an error and stops the merge.
          gh pr checks ${{ github.event.issue.number }} --required --watch

      - name: Fetch Target Branch
        id: pr
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --json baseRefName)
          echo "base=$(echo "$PR_DATA" | jq -r .baseRefName)" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge
        run: |
          git fetch origin pull/${{ github.event.issue.number }}/head:pr-branch
          git checkout ${{ steps.pr.outputs.base }}
          git merge --ff-only pr-branch
          git push origin ${{ steps.pr.outputs.base }}
